name: CI/CD – Neja SaaS

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: apps/backend/package-lock.json }
      - run: cd apps/backend && npm ci
      - run: cd apps/backend && npx prisma generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
      - run: cd apps/backend && npm test -- --passWithNoTests

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: apps/frontend/package-lock.json }
      - run: cd apps/frontend && npm ci
      - run: cd apps/frontend && npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.neja.fr/api/v1

  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: [test-frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g vercel@latest
      - run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/frontend
      - run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/frontend
      - run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/frontend

  deploy-backend:
    name: Deploy Backend → Railway
    runs-on: ubuntu-latest
    needs: [test-backend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g @railway/cli
      - run: railway up --service neja-backend
        working-directory: apps/backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
